# In-container nginx for the Stride PWA. This serves the static dist/ build.
# It is NOT the VPS host nginx (that one terminates TLS for stride.k4yod3.com
# and proxies to 127.0.0.1:3002 -> this container's port 80). Do not add TLS,
# HSTS, or redirects here; the host nginx owns those.
#
# NOTE on add_header inheritance: nginx only inherits `add_header` directives
# into a location if that location declares NO add_header of its own. Because
# every cache-policy location below sets Cache-Control via add_header, the
# security headers must be repeated in each one — they are NOT inherited.

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Don't leak the nginx version.
    server_tokens off;

    # --- gzip -----------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/manifest+json
        image/svg+xml
        application/wasm;

    # Reusable security headers. nginx has no "include vars", so these are
    # repeated verbatim in each location that sets its own add_header.
    # (Kept here as documentation of the canonical set.)
    #   X-Content-Type-Options: nosniff
    #   X-Frame-Options: SAMEORIGIN
    #   Referrer-Policy: strict-origin-when-cross-origin

    # --- index.html: never cache, so PWA clients always see new deploys -------
    # Matches both direct hits and the SPA fallback internal redirect below.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # --- service worker: never cache (the #1 PWA-update invariant) ------------
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # --- web app manifest: correct MIME + revalidate --------------------------
    # Clear the inherited MIME table for this exact path and force the spec type.
    location = /manifest.webmanifest {
        types { }
        default_type application/manifest+json;
        add_header Cache-Control "no-cache" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # --- hashed build assets: cache forever -----------------------------------
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        try_files $uri =404;
    }

    # --- everything else: SPA history-API fallback to index.html --------------
    # Covers icons/, workbox-*.js (hash-named, safe), favicon, etc. Unknown
    # routes fall back to /index.html, which inherits the no-store rule above
    # via the internal redirect into `location = /index.html`.
    location / {
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        try_files $uri $uri/ /index.html;
    }
}
